<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>INU MINI GAME HUB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0; background-color: #f0f5fa; color: #1d3557;
            font-family: 'Pretendard', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* [헤더 구역: 아카이브 느낌] */
        header { text-align: center; padding: 60px 20px 30px; }
        
        .season-tag {
            display: inline-block; background: #1d3557; color: #ffffff;
            padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;
            font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;
        }

        h1 {
            color: #004c97; font-size: 3rem; margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); letter-spacing: 1px;
        }
        
        .subtitle { font-size: 1.2rem; color: #555; margin-bottom: 15px; }
        .club-name { color: #004c97; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 5px rgba(0, 76, 151, 0.4); }
        
        .meta-info { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 25px; }

        .info-badge {
            display: inline-block; background: #ffffff; color: #004c97;
            padding: 10px 20px; border-radius: 30px; font-size: 0.95rem;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(0, 76, 151, 0.1);
        }

        /* [게임 카드 컨테이너] */
        .game-container {
            display: flex; gap: 25px; justify-content: center; flex-wrap: wrap;
            max-width: 1000px; padding: 20px; flex: 1;
        }

        /* [개별 게임 카드] */
        .game-card {
            background: #ffffff; border-radius: 20px; padding: 30px 20px 20px; 
            width: 220px; height: 280px; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: all 0.3s ease;
            text-align: center; border: 1px solid transparent; box-sizing: border-box;
        }
        
        .game-card:hover {
            transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0, 76, 151, 0.15); border: 1px solid #004c97;
        }

        .card-content { width: 100%; }
        .game-card h2 { font-size: 50px; margin: 0 0 15px 0; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        .game-card h3 { color: #1d3557; margin: 0 0 5px 0; font-size: 1.2rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-card .creator { color: #004c97; font-size: 0.9rem; font-weight: bold; margin: 0 0 15px 0; }
        
        .game-card .desc { 
            color: #7f8c8d; font-size: 0.9rem; margin: 0; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em;
        }

        /* 클릭 유도 버튼 */
        .play-btn {
            background: #f0f5fa; color: #004c97; padding: 8px 20px;
            border-radius: 20px; font-size: 0.85rem; font-weight: bold; transition: 0.3s; width: 80%;
        }
        .game-card:hover .play-btn { background: #004c97; color: #ffffff; }

        footer { padding: 40px 0; width: 100%; display: flex; justify-content: center; }
        .inu-logo { width: 160px; opacity: 0.8; transition: opacity 0.3s; }
        .inu-logo:hover { opacity: 1; }
    </style>
</head>
