<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>INU MINI GAME HUB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* [전체 배경 설정]: 아주 연한 하늘빛/회색 배경 */
        body {
            margin: 0;
            background-color: #f0f5fa; 
            color: #1d3557;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* [헤더 구역]: 제목, 소개, 뱃지 */
        header {
            text-align: center;
            padding: 60px 20px 30px;
        }
        
        h1 {
            color: #004c97; /* 인천대 블루 */
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* 부드러운 그림자 */
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 20px;
        }
        
        /* 동아리 이름 neon 포인트 효과 */
        .club-name {
            color: #004c97;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(0, 76, 151, 0.4); /* 살짝 빛나는 네온 느낌 */
        }
        
        /* 게임 개수 & 업데이트 안내 뱃지 */
        .info-badge {
            display: inline-block;
            background: #ffffff;
            color: #004c97;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 76, 151, 0.1);
        }

        /* [게임 카드 컨테이너] */
        .game-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            padding: 20px;
            flex: 1;
        }

        /* [개별 게임 카드 스타일] */
        .game-card {
            background: #ffffff;
            border-radius: 20px; /* 제안해주신 20px 둥근 모서리 */
            padding: 30px 20px;
            width: 220px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); /* 진하지 않은 깔끔한 그림자 */
            transition: all 0.3s ease;
            text-align: center;
            border: 1px solid transparent;
        }
        
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 76, 151, 0.15);
            border: 1px solid #004c97;
        }

        /* 카드 내부 글자 배치 */
        .game-card h2 { font-size: 55px; margin: 0 0 15px 0; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        .game-card h3 { color: #1d3557; margin: 0 0 5px 0; font-size: 1.3rem; font-weight: 800; }
        .game-card .creator { color: #004c97; font-size: 0.95rem; font-weight: bold; margin: 0 0 15px 0; }
        .game-card .desc { color: #7f8c8d; font-size: 0.9rem; margin: 0; line-height: 1.4; }

        /* [푸터 로고] */
        footer { padding: 40px 0; width: 100%; display: flex; justify-content: center; }
        .inu-logo { width: 160px; opacity: 0.8; transition: opacity 0.3s; }
        .inu-logo:hover { opacity: 1; }
    </style>
</head>
<body>

    <header>
        <h1>INU MINI GAME HUB</h1>
        <p class="subtitle">무역학부 데이터 소모임 <span class="club-name">neon</span> 웹게임 아카이브 🚀</p>
        <div class="info-badge">
            🎮 현재 등록된 게임 4개 | ✨ 새 게임이 계속 추가됩니다!
        </div>
    </header>

    <div class="game-container">
        
        <div class="game-card" onclick="location.href='games/jimin-typing/index.html'">
            <h2>⚽</h2>
            <h3>축구 타이핑</h3>
            <p class="creator">지민 제작</p>
            <p class="desc">단어를 빠르게 입력해<br>득점하세요!</p>
        </div>

        <div class="game-card" onclick="location.href='games/park-brick/index.html'">
            <h2>🧱</h2>
            <h3>벽돌 깨기</h3>
            <p class="creator">박OO 제작</p>
            <p class="desc">각도를 맞춰<br>벽돌을 모두 깨세요!</p>
        </div>

        <div class="game-card" onclick="location.href='games/lee-trade-quiz/index.html'">
            <h2>🚢</h2>
            <h3>무역 퀴즈</h3>
            <p class="creator">이OO 제작</p>
            <p class="desc">무역과 물류 상식을<br>맞혀보세요!</p>
        </div>
        
        <div class="game-card" onclick="location.href='games/choi-logistics/index.html'">
            <h2>📦</h2>
            <h3>물류 퍼즐</h3>
            <p class="creator">최OO 제작</p>
            <p class="desc">SCM 흐름을<br>완벽하게 연결하세요!</p>
        </div>

    </div>

    <footer>
        <img src="https://www.inu.ac.kr/sites/inu/images/sub/symbol_mark_01.png" alt="INU Logo" class="inu-logo">
    </footer>

</body>
</html>
